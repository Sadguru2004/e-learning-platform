services:
  - type: web
    name: e-learning-backend
    runtime: image
    repo: https://github.com/Sadguru2004/e-learning-platform.git
    branch: main
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production